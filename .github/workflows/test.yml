name: Test

on:
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 24.18.0

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test
