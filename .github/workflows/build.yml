name: Build

on:
  pull_request:

jobs:
  # -------- Build --------
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24.15.0

      - name: Install dependencies
        run: npm ci

      - name: Run Build
        run: npm run build
